<div class="bg-space-black/50 rounded-2xl overflow-hidden border border-nebula-violet/30 hover:border-nebula-violet transition hover:scale-105 transition-transform duration-300 h-full flex flex-col">
  <div class="relative">
    <img [src]="recipe.imageUrl" [alt]="recipe.name" class="w-full h-48 object-cover">
    <!-- Heart Button -->
    <button 
      (click)="onSaveClick($event)" 
      class="absolute top-3 right-3 w-10 h-10 rounded-full bg-black/50 backdrop-blur-sm hover:bg-nebula-violet/70 flex items-center justify-center transition z-10"
      [title]="isSaved ? 'Remove from saved' : 'Save recipe'">
      <i [class]="isSaved ? 'bi bi-heart-fill text-pink-500 text-xl' : 'bi bi-heart text-star-white text-xl'"></i>
    </button>
  </div>
  <div class="p-5 flex flex-col flex-grow">
    <div class="flex justify-between items-start mb-2">
      <h3 class="text-lg font-semibold text-star-white line-clamp-1">{{ recipe.name }}</h3>
    </div>
    <p class="text-star-white/60 text-sm mb-3 flex-grow line-clamp-2">{{ recipe.description }}</p>
    <div class="flex justify-between items-center mt-2">
      <div class="flex gap-2">
        <span class="text-xs text-star-white/40">{{ recipe.cuisineType }}</span>
        <span class="text-xs text-nebula-violet">🎵 {{ recipe.musicPairing?.genre || 'Ambient' }}</span>
      </div>
      <a [routerLink]="['/recipes', recipe.id]" class="text-star-white hover:text-nebula-violet text-sm">View →</a>
    </div>
  </div>
</div>
