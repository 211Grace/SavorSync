<div class="min-h-screen pt-20">
  <div class="container mx-auto px-4 py-8">
    <!-- Back Button -->
    <div class="mb-6">
      <a routerLink="/" class="inline-flex items-center gap-2 text-nebula-violet hover:text-cosmic-blue transition">
        <i class="bi bi-arrow-left"></i> Back to Home
      </a>
    </div>

    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-4xl font-display text-star-white mb-2">Saved Recipes</h1>
      <p class="text-star-white/60">Your collection of favorite recipes</p>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading" class="flex justify-center items-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-nebula-violet border-t-transparent"></div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && savedRecipes.length === 0" class="text-center py-20">
      <i class="bi bi-heart text-6xl text-star-white/30"></i>
      <h2 class="text-2xl font-display text-star-white mt-4">No saved recipes yet</h2>
      <p class="text-star-white/60 mt-2">Start exploring recipes and heart your favorites!</p>
      <a routerLink="/recipes" class="inline-block mt-6 px-6 py-3 bg-nebula-violet text-star-white rounded-full hover:bg-cosmic-blue transition">
        Browse Recipes
      </a>
    </div>

    <!-- Saved Recipes Grid -->
    <div *ngIf="!isLoading && savedRecipes.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let recipe of savedRecipes" class="bg-space-black/50 rounded-2xl overflow-hidden border border-nebula-violet/30 hover:border-nebula-violet transition hover:scale-105 transition-transform duration-300 h-full flex flex-col">
        <div class="relative">
          <img [src]="recipe.imageUrl" [alt]="recipe.name" class="w-full h-48 object-cover">
          <button 
            (click)="unsaveRecipe(recipe.id)" 
            class="absolute top-3 right-3 w-10 h-10 rounded-full bg-black/50 backdrop-blur-sm hover:bg-pink-500/70 flex items-center justify-center transition z-10"
            title="Remove from saved">
            <i class="bi bi-heart-fill text-pink-500 text-xl"></i>
          </button>
        </div>
        <div class="p-5 flex flex-col flex-grow">
          <h3 class="text-lg font-semibold text-star-white mb-2">{{ recipe.name }}</h3>
          <p class="text-star-white/60 text-sm mb-3 flex-grow line-clamp-2">{{ recipe.description }}</p>
          <div class="flex justify-between items-center mt-2">
            <div class="flex gap-2">
              <span class="text-xs text-star-white/40">{{ recipe.cuisineType }}</span>
              <span class="text-xs text-nebula-violet">🎵 {{ recipe.musicPairing?.genre || 'Ambient' }}</span>
            </div>
            <a [routerLink]="['/recipes', recipe.id]" class="text-star-white hover:text-nebula-violet text-sm">View →</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
