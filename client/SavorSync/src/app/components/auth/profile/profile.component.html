<div class="min-h-screen pt-20">
  <div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto bg-space-black/50 rounded-2xl p-8 border border-nebula-violet/30">
      <h1 class="text-3xl font-display text-star-white mb-6">My Profile</h1>
      
      <div *ngIf="user" class="space-y-4">
        <div>
          <label class="block text-star-white/60 text-sm mb-1">Username</label>
          <p class="text-star-white text-lg">{{ user.username }}</p>
        </div>
        
        <div>
          <label class="block text-star-white/60 text-sm mb-1">Email</label>
          <p class="text-star-white text-lg">{{ user.email }}</p>
        </div>
        
        <div>
          <label class="block text-star-white/60 text-sm mb-1">Member Since</label>
          <p class="text-star-white text-lg">{{ user.createdAt | date:'mediumDate' }}</p>
        </div>
      </div>
      
      <div *ngIf="!user" class="text-center py-8">
        <p class="text-star-white/60">Loading profile...</p>
      </div>
      
      <div class="mt-8 pt-4 border-t border-nebula-violet/30">
        <a routerLink="/saved" class="text-nebula-violet hover:text-cosmic-blue">View Saved Recipes →</a>
      </div>
    </div>
  </div>
</div>
