<header class="bg-space-black/80 backdrop-blur-md fixed top-0 w-full z-50 border-b border-nebula-violet/30">
    <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
        <a routerLink="/" class="text-2xl font-display text-star-white">
            Savor<span class="text-nebula-violet">Sync</span>
        </a>

        <div class="hidden md:flex space-x-8">
            <a routerLink="/" class="text-star-white hover:text-nebula-violet transition">Home</a>
            <a routerLink="/recipes" class="text-star-white hover:text-nebula-violet transition">Recipes</a>
            <a routerLink="/saved" class="text-star-white hover:text-nebula-violet transition">Saved</a>
        </div>

        <div class="flex items-center gap-4">
            <!-- Logged In State -->
            <div *ngIf="authService.isAuthenticated()" class="relative">
                <!-- username from signal -->
                <button (click)="toggleDropdown()"
                    class="flex items-center gap-2 text-star-white hover:text-nebula-violet transition">
                    <i class="bi bi-person-circle"></i>
                    {{ authService.currentUser()?.username }}
                    <i class="bi bi-chevron-down text-xs" [class.rotate-180]="isDropdownOpen"></i>
                </button>

                <div *ngIf="isDropdownOpen"
                    class="absolute right-0 mt-2 w-48 bg-space-black border border-nebula-violet/30 rounded-lg shadow-lg z-50"
                    (mouseleave)="closeDropdown()">
                    <a routerLink="/profile" (click)="closeDropdown()"
                        class="block px-4 py-2 text-star-white hover:bg-nebula-violet/20 transition rounded-t-lg">
                        <i class="bi bi-person me-2"></i> Profile
                    </a>
                    <button (click)="logout()"
                        class="block w-full text-left px-4 py-2 text-star-white hover:bg-nebula-violet/20 transition rounded-b-lg">
                        <i class="bi bi-box-arrow-right me-2"></i> Logout
                    </button>
                </div>
            </div>

            <!-- Logged Out State -->
            <ng-container *ngIf="!authService.isAuthenticated()">
                <a routerLink="/login" class="text-star-white hover:text-nebula-violet transition">Login</a>
                <a routerLink="/register"
                    class="px-4 py-2 bg-nebula-violet rounded-lg text-star-white hover:bg-cosmic-blue transition">Sign
                    Up</a>
            </ng-container>
        </div>
    </nav>
</header>
