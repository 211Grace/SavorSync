<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center">
  <div class="absolute inset-0 bg-black/70" (click)="close()"></div>
  <div class="relative bg-space-black border border-nebula-violet rounded-2xl p-6 max-w-md w-full mx-4">
    <button (click)="close()" class="absolute top-4 right-4 text-star-white/60 hover:text-star-white">✕</button>
    <ng-content></ng-content>
  </div>
</div>
